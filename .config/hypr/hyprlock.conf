cat << 'EOF' > ~/.config/hypr/hyprlock.conf
source = ~/.cache/wal/colors-hyprland.conf

# --- CONFIGURACIÓN GENERAL ---
general {
    no_fade_in = false
    disserter = true
}

# --- FONDO (Blureado y Sincronizado) ---
background {
    monitor =
    path = /home/jon/Pictures/wallpapers/current_wp/hyprlock-bg.png   # Imagen estática (soporta GIFs)
    # Efectos estéticos
    blur_passes = 3
    blur_size = 7
    noise = 0.0117
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

# --- FOTO DE PERFIL (Más grande y subida para espaciar) ---
image {
    monitor =
    path = /home/jon/Pictures/avatars/current/current-avatar
    
    size = 160    # Agrandada de 120 a 160
    rounding = -1 # Círculo perfecto
    
    # Bordes usando colores de Pywal
    border_size = 4
    border_color = $color1
    
    position = 0, 230 # Subida un poco más para dar espacio
    halign = center
    valign = center
    
    shadow_passes = 2
}

# --- HORA (Más pequeña y bajada) ---
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    
    color = $color7
    font_size = 65 # Reducida de 95 a 65
    font_family = JetBrainsMono Nerd Font Mono ExtraBold
    
    position = 0, 40 # Bajada para separarla de la foto
    halign = center
    valign = center
    
    shadow_passes = 2
}

# --- FECHA (Más bajada para separar) ---
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%A, %d de %B")"
    color = $color7
    font_size = 20 # Un pelín más pequeña para balancear
    font_family = JetBrainsMono Nerd Font Mono
    
    position = 0, -20 # Bajada para separarla de la hora
    halign = center
    valign = center
}

# --- CAMPO DE CONTRASEÑA (Más pequeño y SIEMPRE visible) ---
input-field {
    monitor =
    size = 220, 50 # Reducido el ancho a 220 y alto a 50
    outline_thickness = 3
    dots_size = 0.2
    dots_spacing = 0.2
    dots_center = true
    
    outer_color = $color1
    inner_color = $background
    font_color = $color7
    
    fade_on_empty = false # CORREGIDO: Ahora NO se esconde, permanece siempre visible
    placeholder_text = <i>Contraseña...</i>
    hide_input = false
    
    position = 0, -140 # Bajado un poco más para alejarse de la fecha
    halign = center
    valign = center
    
    rounding = 15
    shadow_passes = 2
}
EOF
