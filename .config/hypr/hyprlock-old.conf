cat << 'EOF' > ~/.config/hypr/hyprlock.conf
background {
    monitor =
    # Puedes cambiar esta ruta por tu fondo de pantalla favorito más adelante
    path = /home/jon/Pictures/wallpapers/current_wp/current.png
    blur_passes = 3
    blur_size = 7
    noise = 0.0117
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

input-field {
    monitor =
    size = 250, 50
    outline_thickness = 3
    dots_size = 0.2
    dots_spacing = 0.6
    dots_center = true
    outer_color = rgb(122, 162, 247)
    inner_color = rgb(20, 20, 20)
    font_color = rgb(200, 200, 200)
    fade_on_empty = false
    placeholder_text = <i>Introduce tu contraseña...</i>
    hide_input = false
    position = 0, -20
    halign = center
    valign = center
}
EOF
