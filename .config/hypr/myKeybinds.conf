#################
###KEYBINDINGS###
#################
# https://wiki.hyprland.org/Configuring/Keywords/

$mainMod = SUPER #Setea la tecla "Windows" como la tecla principal modificadora
$terminal = kitty
$fileManager = yazi
#$menu = pkill wofi || wofi --show drun 
$menu = pkill wofi ||  ~/.local/bin/menu.sh



#bind = $mainMod, L, exit,
#bind = $mainMod, E, exec, $fileManager
#bind = $mainMod, V, togglefloating,
#bind = $mainMod, R, exec, $menu
#bind = $mainMod, P, pseudo, # dwindle
#bind = $mainMod, J, togglesplit, # dwindle


# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Example special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

bind = $mainMod, M, workspace, r+1
bind = $mainMod, N, workspace, r-1

# Mover la ventana activa y cambiar de workspace juntos
bind = $mainMod ALT, M, movetoworkspace, r+1
bind = $mainMod ALT, N, movetoworkspace, r-1


# Move/resize windows with mainMod + LMB/RMB and dragging
#bindm = $mainMod, mouse:272, movewindow
#bindm = $mainMod, mouse:273, resizewindow

## Control de Volumen
bindel = , XF86AudioRaiseVolume, exec, swayosd-client --output-volume raise
bindel = , XF86AudioLowerVolume, exec, swayosd-client --output-volume lower
bindl  = , XF86AudioMute,        exec, swayosd-client --output-volume mute-toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

# Control de Brillo de Pantalla
bindel = , XF86MonBrightnessUp,   exec, swayosd-client --brightness raise
bindel = , XF86MonBrightnessDown, exec, swayosd-client --brightness lower 


# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

##############################
### WINDOWS AND WORKSPACES ###hyprlock
##############################
windowrule {
    name = suppress-maximize-events
    match:class = .*
    suppress_event = maximize
}
windowrule {
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false

    no_focus = true
}

#Bindeos propios
bindm = $mainMod, x, movewindow
bindm = $mainMod, z, resizewindow
bind = alt, tab, cyclenext 
bind = $mainMod, c, exec, $terminal
bind = $mainMod, Return, killactive
bind = $mainMod, comma, layoutmsg, togglesplit # dwindle
bind = $mainMod, p, layoutmsg, swapsplit
#bind = , F11, fullscreen, 0
bind = $mainMod, F, fullscreen, 0
bind = $mainMod, tab, exec, $menu
bind = $mainMod, space, exec, $menu
bind = $mainMod, R, exec, pkill waybar && hyprctl dispatch exec waybar
#redimensionar ventanas
bindel = $mainMod, j, exec, hyprctl dispatch -- resizeactive 0 50
bindel = $mainMod, k, exec, hyprctl dispatch -- resizeactive 0 -50
bindel = $mainMod, h, exec, hyprctl dispatch -- resizeactive -50 0
bindel = $mainMod, l, exec, hyprctl dispatch -- resizeactive 50 0
bind = $mainMod, period, togglefloating

bind = $mainMod, u, movewindow, d 
bind = $mainMod, i, movewindow, u 
bind = $mainMod, y, movewindow, l 
bind = $mainMod, o, movewindow, r 

bind = , Print, exec, grim -g "$(slurp)" - | satty --filename - --fullscreen
